services:
  - type: web
    name: topaz-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: topaz-db
          property: connectionString

  - type: web
    name: topaz-frontend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: API_URL
        value: https://topaz-api.onrender.com

databases:
  - name: topaz-db
    databaseName: ticket_db
    user: postgres
    plan: free
